<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>Marvin Redpost 단어·문법 · 중2 대비</title>
<style>
  :root{
    --navy:#1F3864; --navy2:#2c4d84; --light:#EDF1F8; --accent:#C05A28;
    --ink:#1a2540; --sub:#5a6b8c; --line:#d5deee; --bg:#f2f5fb; --card:#fff;
    --good:#1f8a5b; --goodbg:#e7f6ee; --bad:#d9534f; --badbg:#fdecec;
    --eng:#1F3864; --kor:#8a4b16;
  }
  *{box-sizing:border-box; -webkit-tap-highlight-color:transparent;}
  html,body{margin:0;padding:0;}
  body{font-family:"Apple SD Gothic Neo","맑은 고딕","Malgun Gothic",system-ui,sans-serif;
    background:var(--bg); color:var(--ink); min-height:100vh; overscroll-behavior:none;}
  .wrap{max-width:560px; margin:0 auto; padding:0 0 40px; min-height:100vh;}

  header{background:linear-gradient(135deg,var(--navy),var(--navy2)); color:#fff;
    padding:20px 20px 18px; position:sticky; top:0; z-index:20; box-shadow:0 2px 14px rgba(31,56,100,.25);}
  header h1{margin:0; font-size:20px; font-weight:800; letter-spacing:-.3px; display:flex; align-items:center; gap:8px;}
  header .sub{margin-top:4px; font-size:12.5px; color:#c9d6ef; font-weight:500;}
  .backbtn{background:rgba(255,255,255,.15); border:none; color:#fff; font-size:14px;
    padding:7px 13px; border-radius:20px; font-weight:700; cursor:pointer; margin-bottom:10px;}
  .backbtn:active{background:rgba(255,255,255,.28);}

  .setgrid{padding:16px; display:grid; grid-template-columns:1fr 1fr; gap:11px;}
  .setcard{background:var(--card); border:1px solid var(--line); border-radius:15px; padding:15px 14px;
    cursor:pointer; transition:transform .12s; display:flex; flex-direction:column; gap:6px; position:relative; overflow:hidden;}
  .setcard:active{transform:scale(.97);}
  .setcard .pg{font-size:12px; font-weight:800; color:var(--navy);}
  .setcard .tp{font-size:13.5px; font-weight:700; line-height:1.35; min-height:36px;}
  .setcard .cnt{font-size:11.5px; color:var(--sub); font-weight:600; display:flex; flex-wrap:wrap; gap:4px; align-items:center;}
  .badge-best{background:#e7f0ff; color:var(--navy); font-weight:800; font-size:10px; padding:1px 6px; border-radius:5px;}
  .badge-fav{background:#fff3d6; color:#a8730a; font-weight:800; font-size:10px; padding:1px 6px; border-radius:5px;}
  .star{width:38px; height:44px; border:none; background:none; color:#e0b100; font-size:23px; cursor:pointer; flex-shrink:0; line-height:1; padding:0;}
  .star:not(.on){color:#c7cede;}
  .star:active{transform:scale(.85);}
  .star.sm{width:30px; height:30px; font-size:18px;}
  .studybar{display:flex; gap:8px; padding:2px 2px 12px;}
  .emptyfav{text-align:center; color:var(--sub); font-size:13.5px; line-height:1.7; padding:50px 20px;}
  .chip{border:1px solid var(--line); background:#fff; color:var(--navy); font-size:12.5px; font-weight:700; padding:8px 14px; border-radius:20px; cursor:pointer;}
  .chip.on{background:var(--navy); color:#fff; border-color:var(--navy);}
  .chip:active{transform:scale(.96);}
  .bestline{font-size:13px; color:var(--sub); margin-top:10px; font-weight:600;}
  .bestline b{color:var(--navy);}
  .mbest{display:inline-block; margin-left:6px; font-size:11px; font-weight:800; color:#a8730a; background:#fff3d6; padding:2px 7px; border-radius:6px; vertical-align:middle;}
  .stbtn.send{background:linear-gradient(135deg,#1f8a5b,#26a56b); color:#fff;}
  .homehead{display:flex; align-items:center; justify-content:space-between; gap:10px;}
  .histbtn{background:rgba(255,255,255,.16); border:none; color:#fff; font-size:12.5px; font-weight:800;
    padding:8px 12px; border-radius:20px; cursor:pointer; flex-shrink:0;}
  .histbtn:active{background:rgba(255,255,255,.28);}
  .namebar{display:flex; align-items:center; justify-content:space-between; gap:10px; background:#fff;
    border:1px solid var(--line); border-radius:12px; padding:12px 14px; margin-bottom:12px; font-size:13px; color:var(--sub);}
  .namebar b{color:var(--ink);}
  .hrow{display:flex; align-items:center; justify-content:space-between; gap:12px; background:#fff;
    border:1px solid var(--line); border-radius:12px; padding:13px 15px; margin-bottom:9px;}
  .hpages{font-size:14px; font-weight:800; color:var(--ink);}
  .htopic{font-size:12px; font-weight:600; color:var(--sub); margin-left:4px;}
  .hmeta{font-size:11.5px; color:var(--sub); margin-top:3px;}
  .hscore{font-size:17px; font-weight:800; text-align:right; flex-shrink:0;}
  .hscore span{display:block; font-size:11px; font-weight:700;}
  .hscore.good{color:var(--good);} .hscore.low{color:#c96a2e;}
  .toast{position:fixed; left:50%; bottom:32px; transform:translateX(-50%) translateY(20px);
    background:#222c44; color:#fff; font-size:13.5px; font-weight:600; padding:13px 18px; border-radius:12px;
    max-width:88%; text-align:center; opacity:0; pointer-events:none; transition:.28s; z-index:100; line-height:1.5;}
  .toast.show{opacity:1; transform:translateX(-50%) translateY(0);}
  .modal{position:fixed; inset:0; background:rgba(20,30,55,.55); display:flex; align-items:center;
    justify-content:center; padding:22px; z-index:120;}
  .modalbox{background:#fff; border-radius:18px; padding:20px; width:100%; max-width:420px;}
  .modaltitle{font-size:16px; font-weight:800; color:var(--navy); margin-bottom:12px;}
  .modalta{width:100%; height:150px; border:1.5px solid var(--line); border-radius:12px; padding:12px;
    font-size:14px; font-family:inherit; line-height:1.6; color:var(--ink); resize:none; margin-bottom:8px;}
  .modalhint{font-size:12px; color:var(--sub); margin-bottom:14px; line-height:1.5;}
  .setcard .bar{position:absolute; left:0; top:0; bottom:0; width:5px; background:var(--navy);}

  .intro{padding:18px 18px 4px;}
  .intro h2{margin:0 0 5px; font-size:16px; color:var(--navy);}
  .intro p{margin:0; font-size:13px; color:var(--sub); line-height:1.6;}

  .modes{padding:16px; display:flex; flex-direction:column; gap:12px;}
  .modecard{background:var(--card); border:1px solid var(--line); border-radius:16px; padding:18px;
    cursor:pointer; display:flex; align-items:center; gap:14px;}
  .modecard:active{transform:scale(.98);}
  .modeicon{width:48px; height:48px; border-radius:13px; background:var(--light); color:var(--navy);
    display:flex; align-items:center; justify-content:center; flex-shrink:0;}
  .modeicon svg{width:26px; height:26px;}
  .modeicon.kor{background:#f6ece1; color:var(--kor);}
  .modeicon.quiz{background:#e6f0ea; color:#1f8a5b;}
  .badge.q{background:#e0f0e8; color:#1f8a5b;}
  .quiz{padding:20px 18px 40px;}
  .qcard{background:#fff; border:1px solid var(--line); border-radius:20px; padding:24px 20px; box-shadow:0 2px 12px rgba(31,56,100,.07);}
  .qprog{font-size:12.5px; color:var(--sub); font-weight:700; margin-bottom:8px; text-align:center;}
  .qbar{height:6px; background:var(--light); border-radius:4px; overflow:hidden; margin-bottom:20px;}
  .qbar > i{display:block; height:100%; background:#1f8a5b; transition:width .3s;}
  .exprompt{font-size:20px; font-weight:700; line-height:1.5; color:var(--ink); text-align:center; margin-bottom:8px; word-break:keep-all;}
  .exprompt.small{font-size:17px; font-weight:600;}
  .exhint{text-align:center; font-size:13px; color:var(--sub); margin-bottom:16px;}
  .exhint b{color:var(--navy);}
  .hintbtn{display:block; margin:0 auto 16px; background:#fff7e6; border:1px solid #ffe0a3; color:#9a6a00;
    font-size:13.5px; font-weight:700; padding:9px 18px; border-radius:20px; cursor:pointer;}
  .hintbtn:active{background:#ffefcc;}
  .stlisten{display:block; margin:0 auto 14px; background:none; border:none; color:var(--navy2); font-size:13px; font-weight:700; cursor:pointer;}
  .exopts{display:flex; flex-direction:column; gap:10px; margin-top:8px;}
  .exopt{border:1.5px solid var(--line); background:#fff; border-radius:13px; padding:15px; font-size:15.5px; font-weight:700; color:var(--ink); cursor:pointer; text-align:center; transition:.12s; word-break:keep-all; line-height:1.4;}
  .exopt:active{transform:scale(.98);}
  .exopt.correct{background:#e7f6ee; border-color:var(--good); color:var(--good);}
  .exopt.wrong{background:#fdecec; border-color:var(--bad); color:var(--bad);}
  .qnext{margin-top:16px; width:100%; padding:15px; border:none; border-radius:13px; background:var(--navy); color:#fff; font-size:15px; font-weight:800; cursor:pointer;}
  .qnext:disabled{opacity:.4;}
  .modecard h3{margin:0 0 3px; font-size:16px;}
  .modecard p{margin:0; font-size:12.5px; color:var(--sub); line-height:1.45;}
  .badge{display:inline-block; font-size:10.5px; font-weight:800; padding:2px 7px; border-radius:6px; margin-left:6px; vertical-align:middle;}
  .badge.e{background:#e6edfa; color:var(--navy);}
  .badge.k{background:#f6ece1; color:var(--kor);}

  .list{padding:14px 14px 0;}
  .word{background:var(--card); border:1px solid var(--line); border-radius:16px; margin-bottom:11px; overflow:hidden;}
  .word .top{display:flex; align-items:center; gap:12px; padding:15px 16px; cursor:pointer;}
  .word .num{min-width:30px; height:30px; border-radius:9px; background:var(--light); color:var(--navy);
    font-weight:800; font-size:13px; display:flex; align-items:center; justify-content:center; flex-shrink:0;}
  .word .main{flex:1; min-width:0;}
  .word .en{font-size:19px; font-weight:800; display:flex; align-items:baseline; gap:8px; flex-wrap:wrap;}
  .word .pos{font-size:11.5px; color:var(--sub); font-weight:700; background:#eef2f9; padding:2px 7px; border-radius:6px;}
  .word .ko{font-size:14.5px; color:var(--navy); font-weight:700; margin-top:3px;}
  .speak{width:44px; height:44px; border-radius:50%; border:none; flex-shrink:0;
    background:linear-gradient(135deg,var(--navy),var(--navy2)); color:#fff;
    display:flex; align-items:center; justify-content:center; cursor:pointer; box-shadow:0 3px 10px rgba(31,56,100,.3);}
  .speak:active{transform:scale(.88);}
  .speak.playing{animation:pulse .7s infinite;}
  @keyframes pulse{0%,100%{transform:scale(1);}50%{transform:scale(1.12);}}
  .speak svg{width:22px; height:22px;}
  .word .ex{padding:0 16px 15px 58px; border-top:1px solid var(--line); display:none;}
  .word.open .ex{display:block; padding-top:12px;}
  .word .exrow{display:flex; align-items:flex-start; gap:9px; margin-top:9px;}
  .word .exen{font-size:14px; line-height:1.5; flex:1;}
  .word .exko{font-size:12.5px; line-height:1.5; color:var(--sub); margin-top:3px;}
  .exspeak{width:32px; height:32px; border-radius:50%; border:1px solid var(--line); background:#fff;
    color:var(--navy); display:flex; align-items:center; justify-content:center; flex-shrink:0; cursor:pointer;}
  .exspeak svg{width:15px; height:15px;}
  .exspeak.playing{background:var(--navy); color:#fff; animation:pulse .7s infinite;}

  .speak-test{padding:20px 18px 40px;}
  .stcard{background:#fff; border:1px solid var(--line); border-radius:20px; padding:28px 22px; text-align:center;
    box-shadow:0 2px 12px rgba(31,56,100,.07);}
  .stprog{font-size:12.5px; color:var(--sub); font-weight:700; margin-bottom:6px;}
  .stbar{height:6px; background:var(--light); border-radius:4px; overflow:hidden; margin-bottom:22px;}
  .stbar > i{display:block; height:100%; background:var(--navy); transition:width .3s;}
  .stq-label{font-size:12px; font-weight:800; letter-spacing:.3px; padding:3px 10px; border-radius:20px; display:inline-block; margin-bottom:12px;}
  .stq-label.e{background:#e6edfa; color:var(--navy);}
  .stq-label.k{background:#f6ece1; color:var(--kor);}
  .stprompt{font-size:15px; color:var(--sub); font-weight:600; margin-bottom:4px;}
  .stword{font-size:34px; font-weight:800; letter-spacing:-.5px; margin-bottom:4px; word-break:break-word; line-height:1.2;}
  .stword.kor{color:var(--kor);}
  .stpos{font-size:12px; color:var(--sub); font-weight:700; margin-bottom:8px;}
  .stlisten{background:none; border:none; color:var(--navy2); font-size:13px; font-weight:700; cursor:pointer;
    display:inline-flex; align-items:center; gap:5px; margin-bottom:22px;}
  .stlisten svg{width:15px;height:15px;}

  .micbtn{width:96px; height:96px; border-radius:50%; border:none; margin:0 auto 14px; display:block;
    background:linear-gradient(135deg,var(--navy),var(--navy2)); color:#fff; cursor:pointer;
    box-shadow:0 6px 20px rgba(31,56,100,.35); transition:transform .1s;}
  .micbtn:active{transform:scale(.93);}
  .micbtn svg{width:42px; height:42px;}
  .micbtn.recording{background:linear-gradient(135deg,#d9534f,#e5695f); animation:mic 1.1s infinite;}
  @keyframes mic{0%,100%{box-shadow:0 6px 20px rgba(217,83,79,.4);}50%{box-shadow:0 6px 30px rgba(217,83,79,.75);}}
  .miclabel{font-size:13px; color:var(--sub); font-weight:600; min-height:20px; margin-bottom:14px;}
  .micerror{background:#fff4e6; border:1px solid #ffd9a8; color:#9a5b00; border-radius:12px;
    padding:14px 16px; font-size:13.5px; line-height:1.6; margin-bottom:16px; text-align:left;}
  .ordiv{display:flex; align-items:center; gap:10px; margin:6px 0 12px; color:var(--sub); font-size:12px; font-weight:600;}
  .ordiv::before,.ordiv::after{content:""; flex:1; height:1px; background:var(--line);}
  .typerow{display:flex; gap:8px;}
  .typein{flex:1; border:1.5px solid var(--line); border-radius:12px; padding:14px 14px; font-size:16px;
    font-family:inherit; color:var(--ink); outline:none; min-width:0;}
  .typein:focus{border-color:var(--navy);}
  .typebtn{border:none; border-radius:12px; padding:0 20px; background:var(--navy); color:#fff;
    font-size:15px; font-weight:800; cursor:pointer; flex-shrink:0;}
  .typebtn:active{transform:scale(.97);}

  .heard{font-size:13px; color:var(--sub); margin-bottom:10px; min-height:18px;}
  .heard b{color:var(--ink);}
  .verdict{font-size:20px; font-weight:800; margin-bottom:6px; min-height:26px;}
  .verdict.ok{color:var(--good);} .verdict.no{color:var(--bad);}
  .answer{font-size:13px; color:var(--sub); margin-bottom:16px;}
  .answer b{color:var(--ink);}

  .stbtns{display:flex; gap:10px;}
  .stbtn{flex:1; padding:14px; border:none; border-radius:13px; font-size:15px; font-weight:800; cursor:pointer;}
  .stbtn.ghost{background:#fff; border:1.5px solid var(--line); color:var(--navy);}
  .stbtn.solid{background:var(--navy); color:#fff;}
  .stbtn:active{transform:scale(.98);}

  .stresult{text-align:center; padding:20px 4px;}
  .stresult .score{font-size:46px; font-weight:800; color:var(--navy);}
  .stresult .lbl{font-size:14px; color:var(--sub); margin-top:6px;}
  .review{margin-top:22px; text-align:left;}
  .review h4{font-size:13px; color:var(--sub); margin:0 0 8px;}
  .rvrow{display:flex; align-items:center; gap:10px; padding:11px 13px; background:#fff; border:1px solid var(--line);
    border-radius:11px; margin-bottom:7px;}
  .rvrow .rok{width:22px;height:22px;border-radius:50%;display:flex;align-items:center;justify-content:center;color:#fff;font-size:13px;font-weight:800;flex-shrink:0;}
  .rvrow.ok .rok{background:var(--good);} .rvrow.no .rok{background:var(--bad);}
  .rvrow .rw{flex:1; min-width:0;}
  .rvrow .rw b{font-weight:800; font-size:14.5px;}
  .rvrow .rw span{display:block; font-size:12.5px; color:var(--sub);}
  .rvrow .rspk{width:30px;height:30px;border-radius:50%;border:1px solid var(--line);background:#fff;color:var(--navy);display:flex;align-items:center;justify-content:center;cursor:pointer;flex-shrink:0;}
  .rvrow .rspk svg{width:14px;height:14px;}

  .notice{background:#fff4e6; border:1px solid #ffd9a8; color:#9a5b00; border-radius:12px;
    padding:14px 16px; font-size:13px; line-height:1.6; margin:16px 0;}
  .skip{background:none;border:none;color:var(--sub);font-size:13px;font-weight:700;cursor:pointer;text-decoration:underline;margin-top:14px;}
  .tip{font-size:11.5px; color:var(--sub); margin-top:14px; line-height:1.5;}

/* ===== 워크북(스코프) ===== */
.wbwrap{
    --ink:#1a1a1a; --muted:#666; --line:#d9d9d9; --soft:#f4f4f2;
    --accent:#2f6f4e; --accent-soft:#e7f1ea; --warn:#b45309; --warn-soft:#fdf1e3;
    --blank:#9aa0a6;
  }
.wbwrap *{box-sizing:border-box;}
.wbwrap{-webkit-print-color-adjust:exact; print-color-adjust:exact;}
.wbwrap{
    font-family:"Malgun Gothic","맑은 고딕",system-ui,"Segoe UI",sans-serif;
    color:var(--ink); line-height:1.6; margin:0; background:#ececea;
    font-size:15px;
  }
.wbwrap .sheet{
    max-width:820px; margin:24px auto; background:#fff; padding:38px 44px;
    box-shadow:0 2px 14px rgba(0,0,0,.08); border-radius:4px;
  }
.wbwrap .book{font-size:12px; color:var(--muted); letter-spacing:.3px;}
.wbwrap h1{font-size:23px; margin:4px 0 2px; letter-spacing:-.3px;}
.wbwrap .sub{font-size:13px; color:var(--accent); font-weight:700; margin-bottom:14px;}
.wbwrap .meta{
    display:flex; gap:0; border:1px solid var(--line); border-radius:6px;
    overflow:hidden; margin:14px 0 6px; font-size:13px;
  }
.wbwrap .meta div{flex:1; padding:8px 12px; border-right:1px solid var(--line);}
.wbwrap .meta div:last-child{border-right:none;}
.wbwrap .meta b{color:var(--muted); font-weight:600; margin-right:8px;}
.wbwrap .tip{
    font-size:12.5px; color:var(--muted); background:var(--soft);
    border-radius:6px; padding:9px 13px; margin:12px 0 0;
  }
.wbwrap .part{margin-top:30px;}
.wbwrap .part-h{
    display:flex; align-items:center; gap:10px;
    border-bottom:2px solid var(--accent); padding-bottom:6px; margin-bottom:4px;
  }
.wbwrap .badge{
    background:var(--accent); color:#fff; font-size:13px; font-weight:700;
    padding:3px 11px; border-radius:20px; white-space:nowrap;
  }
.wbwrap .part-h h2{font-size:17px; margin:0;}
.wbwrap .howto{font-size:12.5px; color:var(--muted); margin:6px 0 14px;}
.wbwrap .q{margin:0 0 17px; padding-left:2px; page-break-inside:avoid;}
.wbwrap .q .num{font-weight:700; color:var(--accent); margin-right:6px;}
.wbwrap .ko{color:#333;}
.wbwrap .cond{font-size:12.5px; color:var(--muted);}
.wbwrap .chip{
    display:inline-block; font-family:"Consolas",monospace; font-size:13.5px;
    background:var(--soft); border:1px solid var(--line); border-radius:5px;
    padding:2px 9px; margin:4px 5px 0 0;
  }
.wbwrap .chip.trap-note{border-style:dashed;}
.wbwrap .tokens{margin-top:6px;}
.wbwrap .given{
    font-family:"Consolas",monospace; background:var(--accent-soft);
    border-radius:4px; padding:1px 7px; font-weight:700; color:var(--accent);
  }
.wbwrap .u-line{
    border-bottom:1.4px solid var(--blank); min-height:1.6em; margin-top:8px;
  }
.wbwrap .u-line.short{display:inline-block; min-width:120px; border-bottom:1.4px solid var(--blank);}
.wbwrap .blank{
    display:inline-block; min-width:82px; border-bottom:1.4px solid var(--blank);
    text-align:center; margin:0 2px;
  }
.wbwrap .underline{border-bottom:1.4px solid var(--ink); font-weight:600;}
.wbwrap .warn-tag{
    font-size:11px; font-weight:700; color:var(--warn); background:var(--warn-soft);
    border:1px solid #f0d9b8; border-radius:4px; padding:1px 7px; margin-left:6px;
  }
.wbwrap .sent{margin-top:3px;}
.wbwrap .dnd .bank{margin-top:8px; display:flex; flex-wrap:wrap; gap:7px;}
.wbwrap .dnd .chip{cursor:grab; user-select:none; -webkit-user-select:none; touch-action:none;}
.wbwrap .dnd .chip:active{cursor:grabbing;}
.wbwrap .chip.dragging{opacity:.28;}
.wbwrap .chip.ghost{
    position:fixed; z-index:1000; margin:0; pointer-events:none;
    transform:translate(-50%,-50%); opacity:.96;
    background:#fff; border-color:var(--accent); color:var(--accent);
    box-shadow:0 8px 18px rgba(0,0,0,.28);
  }
.wbwrap .answer-zone{
    margin-top:8px; min-height:48px; border:1.8px dashed var(--accent);
    border-radius:9px; background:var(--accent-soft); padding:9px 11px;
    display:flex; flex-wrap:wrap; gap:7px; align-items:center;
  }
.wbwrap .answer-zone.empty::before{
    content:attr(data-ph); color:var(--blank); font-size:12.5px; font-style:italic;
  }

const WORKBOOKS = {"b1-1": "<div class=\"wb-ctrl\"><button type=\"button\" class=\"wb-gradeall\">📊 전체 채점<\/button><button type=\"button\" class=\"wb-toggle\">정답·해설 보기<\/button><\/div>\n<div class=\"wb-lead\">✏️ 4가지 유형 16문항 — 단어를 드래그하거나 입력한 뒤 <b>전체 채점<\/b>을 눌러 점수를 확인하세요. 문제마다 <b>확인<\/b>으로 즉시 채점도 돼요.<\/div>\n<div class=\"part\">\n<div class=\"part-h\"><span class=\"badge\">유형 1<\/span><h2>어순 배열 (Unscramble)<\/h2><\/div>\n<div class=\"howto\">단어를 <b>정답칸으로 끌어다 놓아(드래그)<\/b> 우리말 뜻에 맞게 배열하세요. 단어를 <b>클릭<\/b>해도 이동합니다. ⚠️ 표시 문제엔 <b>쓰지 않는 함정 단어 1개<\/b>가 있어요!<\/div>\n<div class=\"q dnd\" data-answer=\"The servant whispered quietly to the king.\"><div><span class=\"num\">1.<\/span><span class=\"ko\">그 하인은 왕에게 조용히 속삭였다.<\/span><\/div><div class=\"answer-zone empty\" data-ph=\"⬇ 여기에 단어를 순서대로 끌어다 놓으세요\"><\/div><div class=\"bank\"><span class=\"chip\">servant<\/span><span class=\"chip\">quietly<\/span><span class=\"chip\">whispered<\/span><span class=\"chip\">to<\/span><span class=\"chip\">the<\/span><span class=\"chip\">The<\/span><span class=\"chip\">king.<\/span><\/div><div class=\"dnd-ctrl\"><button type=\"button\" class=\"btn-check\">확인<\/button><button type=\"button\" class=\"btn-reset\">다시<\/button><span class=\"verdict\"><\/span><\/div><div class=\"hint-drag\">💡 정답칸의 단어를 클릭하면 아래로 되돌아가요. 드래그로 순서도 바꿀 수 있어요.<\/div><div class=\"u-line\"><\/div><\/div>\n<div class=\"q dnd\" data-answer=\"The castle is the oldest building in the kingdom.\" data-trap=\"older\"><div><span class=\"num\">2.<\/span><span class=\"ko\">그 성은 왕국에서 가장 오래된 건물이다.<\/span> <span class=\"warn-tag\">⚠️ 함정 1개<\/span><\/div><div class=\"answer-zone empty\" data-ph=\"⬇ 여기에 단어를 순서대로 끌어다 놓으세요 (함정 주의!)\"><\/div><div class=\"bank\"><span class=\"chip\">building<\/span><span class=\"chip\">older<\/span><span class=\"chip\">castle<\/span><span class=\"chip\">kingdom.<\/span><span class=\"chip\">the<\/span><span class=\"chip\">the<\/span><span class=\"chip\">is<\/span><span class=\"chip\">The<\/span><span class=\"chip\">ol =\"iq-row\"><button type=\"button\" class=\"btn-check iq-check\">확인<\/button><span class=\"verdict\"><\/span><\/div><div class=\"reveal-ans\"><\/div><\/div>\n<\/div>\n<div class=\"part\">\n<div class=\"part-h\"><span class=\"badge\">유형 4<\/span><h2>조건부 부분 영작 (Sentence Completion)<\/h2><\/div>\n<div class=\"howto\">우리말 뜻과 <b>주어진 핵심 단어<\/b>를 반드시 활용하여 <b>영어 문장을 완성<\/b>하고 <b>확인<\/b>을 누르세요. (단어의 형태는 바꿔도 좋아요. 대소문자·마침표·쉼표는 채점에서 무시됩니다.)<\/div>\n<div class=\"q iq\" data-answer=\"I had a weird dream last night.|I had a weird dream yesterday.\" data-example=\"I had a weird dream last night.\"><div><span class=\"num\">13.<\/span><span class=\"ko\">나는 어젯밤에 이상한 꿈을 꿨다.<\/span><\/div><div class=\"cond\">조건: <span class=\"chip\">weird<\/span><span class=\"chip\">dream<\/span><\/div><input type=\"text\" class=\"iq-input full\" autocomplete=\"off\" autocapitalize=\"off\" spellcheck=\"false\" placeholder=\"영어 문장을 입력하세요\"><div class=\"iq-row\"><button type=\"button\" class=\"btn-check iq-check\">확인<\/button><button type=\"button\" class=\"iq-reveal\">정답 예시<\/button><span class=\"verdict\"><\/span><\/div><div class=\"reveal-ans\"><\/div><\/div>\n<div class=\"q iq\" data-answer=\"The boy noticed that he was adopted.|The boy noticed he was adopted.\" data-example=\"The boy noticed that he was adopted.\"><div><span class=\"num\">14.<\/span><span class=\"ko\">그 소년은 자신이 입양되었다는 것을 알아차렸다.<\/span><\/div><div class=\"cond\">조건: <span class=\"chip\">noticed<\/span><span class=\"chip\">adopted<\/span><\/div><input type=\"text\" class=\"iq-input full\" autocomplete=\"off\" autocapitalize=\"off\" spellcheck=\"false\" placeholder=\"영어 문장을 입력하세요\"><div class=\"iq-row\"><button type=\"button\" class=\"btn-check iq-check\">확인<\/button><button type=\"button\" class=\"iq-reveal\">정답 예시<\/button><span class=\"verdict\"><\/span><\/div><div class=\"reveal-ans\"><\/div><\/div>\n<div class=\"q iq\" data-answer=\"Unless we hurry, we will miss the bus.|We will miss the bus unless we hurry.\" data-example=\"Unless function wireWorkbook(){
  const root=document.querySelector('.wbwrap'); if(!root) return;
  const norm=(s)=>(s||'').replace(/\s+/g,' ').trim();
  const normText=(s)=>(s||'').toLowerCase().replace(/['’]/g,'').replace(/[^a-z0-9\s]/g,' ').replace(/\s+/g,' ').trim();
  function refresh(q){const zone=q.querySelector('.answer-zone');
    zone.classList.toggle('empty', zone.querySelectorAll('.chip').length===0);
    zone.classList.remove('correct','wrong');
    const v=q.querySelector('.verdict'); v.textContent=''; v.className='verdict';}
  function type1Correct(q){const got=norm([].map.call(q.querySelector('.answer-zone').querySelectorAll('.chip'),c=>c.textContent).join(' '));
    return got===norm(q.getAttribute('data-answer'));}
  let active=null;
  function afterElement(zone,x,y,skip){const els=[].slice.call(zone.querySelectorAll('.chip')).filter(c=>c!==skip);
    let best={dist:Infinity,el:null,before:true};
    els.forEach(el=>{const b=el.getBoundingClientRect();const cx=b.left+b.width/2,cy=b.top+b.height/2;
      const d=Math.abs(y-cy)*3+Math.abs(x-cx); if(d<best.dist)best={dist:d,el:el,before:(x<cx)};});
    return best;}
  function beginDrag(){const chip=active.chip,r=chip.getBoundingClientRect();const g=chip.cloneNode(true);
    g.className='chip ghost';g.style.width=r.width+'px';g.style.left=(r.left+r.width/2)+'px';g.style.top=(r.top+r.height/2)+'px';
    document.body.appendChild(g);active.ghost=g;active.dragging=true;chip.classList.add('dragging');}
  function moveGhost(x,y){const g=active.ghost;g.style.left=x+'px';g.style.top=y+'px';g.style.display='none';
    const under=document.elementFromPoint(x,y);g.style.display='';
    const zone=(under&&under.closest)?under.closest('.answer-zone,.bank'):null;
    if(zone&&zone.closest('.dnd')===active.q){const pos=afterElement(zone,x,y,active.chip);
      if(!pos.el)zone.appendChild(active.chip);else if(pos.before)zone.insertBefore(active.chip,pos.el);else zone.insertBefore(active.chip,pos.el.nextSibling);
      active.q.querySelectorAll('.answer-zone,.bank').forEach(z=>z.classList.toggle('over',z===zone));}}
  function onDown(e){if(e.button!==undefined&&e.button>0)return;const chip=e.currentTarget;
    active={chip,q:chip.closest('.dnd'),startX:e.clientX,startY:e.clientY,ghost:null,dragging:false,pid:e.pointerId};
    document.addEventListener('pointermove',onMove,{passive:false});document.addEventListener('pointerup',onUp);document.addEventListener('pointercancel',onUp);}
  function onMove(e){if(!active||(e.pointerId!==undefined&&e.pointerId!==active.pid))return;
    if(!active.dragging){if(Math.hypot(e.clientX-active.startX,e.clientY-active.startY)<8)return;beginDrag();}
    e.preventDefault();moveGhost(e.clientX,e.clientY);}
  function onUp(e){if(!active||(e.pointerId!==undefined&&e.pointerId!==active.pid))return;
    document.removeEventListener('pointermove',onMove,{passive:false});document.removeEventListener('pointerup',onUp);document.removeEventListener('pointercancel',onUp);
    const chip=active.chip,q=active.q;
    if(active.dragging){if(active.ghost)active.ghost.remove();chip.classList.remove('dragging');q.querySelectorAll('.over').forEach(z=>z.classList.remove('over'));}
    else{const zone=q.querySelector('.answer-zone'),bank=q.querySelector('.bank');(chip.parentElement===bank?zone:bank).appendChild(chip);}
    refresh(q);active=null;}
  root.querySelectorAll('.dnd').forEach(q=>{
    const bank=q.querySelector('.bank'),zone=q.querySelector('.answer-zone');let order=0;
    q.querySelectorAll('.chip').forEach(c=>{c.dataset.order=order++;c.addEventListener('pointerdown',onDown);});
    q.querySelector('.btn-check').addEventListener('click',()=>{
      const got=norm([].map.call(zone.querySelectorAll('.chip'),c=>c.textContent).join(' '));
      const ans=norm(q.getAttribute('data-answer')),trap=q.getAttribute('data-trap'),v=q.querySelector('.verdict');
      zone.classList.remove('correct','wrong');
      if(got===ans){zone.classList.add('correct');v.className='verdict ok';v.textContent='✅ 정답이에요! 완벽해요!';}
      else{zone.classList.add('wrong');v.className='verdict no';
        if(got==='')v.textContent='단어를 정답칸에 놓아 주세요!';
        else if(trap&&got.split(' ').indexOf(trap)>-1)v.textContent='⚠️ 함정 단어 "'+trap+'"가 들어 있어요. 빼고 다시!';
        else v.textContent='❌ 순서를 다시 확인해 보세요.';}});
    q.querySelector('.btn-reset').addEventListener('click',()=>{
      [].slice.call(q.querySelectorAll('.chip')).sort((a,b)=>a.dataset.order-b.dataset.order).forEach(c=>bank.appendChild(c));
      refresh(q);});
    refresh(q);
  });
  function iqCorrect(q){const got=normText(q.querySelector('.iq-input').value);if(!got)return null;
    return q.getAttribute('data-answer').split('|').map(normText).indexOf(got)>-1;}
  function showReveal(q){const r=q.querySelector('.reveal-ans');if(!r)return;
    const ex=q.getAttribute('data-example')||q.getAttribute('data-answer').split('|')[0];
    r.innerHTML='정답 예시: <b>'+esc(ex)+'</b>';r.classList.add('show');}
  function iqCheck(q){const inp=q.querySelector('.iq-input'),v=q.querySelector('.verdict'),res=iqCorrect(q);
    inp.classList.remove('ok','no');
    if(res===null){v.className='verdict no';v.textContent='답을 입력해 주세요!';return;}
    if(res){inp.classList.add('ok');v.className='verdict ok';v.textContent='✅ 정답!';}
    else{inp.classList.add('no');v.className='verdict no';v.textContent='❌ 다시 시도!';showReveal(q);}}
  root.querySelectorAll('.iq').forEach(q=>{const inp=q.querySelector('.iq-input');
    q.querySelector('.iq-check').addEventListener('click',()=>iqCheck(q));
    inp.addEventListener('keydown',e=>{if(e.key==='Enter'){e.preventDefault();iqCheck(q);}});
    inp.addEventListener('input',()=>{inp.classList.remove('ok','no');const v=q.querySelector('.verdict');v.textContent='';v.className='verdict';});
    const rv=q.querySelector('.iq-reveal');if(rv)rv.addEventListener('click',()=>showReveal(q));});
  root.querySelector('.wb-gradeall').addEventListener('click',()=>{
    let correct=0,total=0,blank=0;
    root.querySelectorAll('.dnd').forEach(q=>{total++;const ok=type1Correct(q);
      const zone=q.querySelector('.answer-zone'),v=q.querySelector('.verdict');zone.classList.remove('correct','wrong');
      if(ok){correct++;zone.classList.add('correct');v.className='verdict ok';v.textContent='✅ 정답!';}
      else{zone.classList.add('wrong');v.className='verdict no';v.textContent='❌ 다시 확인';}});
    root.querySelectorAll('.iq').forEach(q=>{total++;const r=iqCorrect(q),inp=q.querySelector('.iq-input'),v=q.querySelector('.verdict');inp.classList.remove('ok','no');
      if(r===null){blank++;v.className='verdict no';v.textContent='미입력';}
      else if(r){correct++;inp.classList.add('ok');v.className='verdict ok';v.textContent='✅ 정답!';}
      else{inp.classList.add('no');v.className='verdict no';v.textContent='❌ 다시!';showReveal(q);}});
    const pct=Math.round(correct/total*100);
    let msg='📊 점수: <span class="big">'+correct+' / '+total+'</span> · '+pct+'점';
    if(blank>0)msg+=' (미입력 '+blank+')';
    msg+=pct===100?' 🎉 완벽해요!':(pct>=70?' 👍 잘했어요!':' 💪 다시 도전!');
    const box=root.querySelector('#scorebox');box.innerHTML=msg;box.classList.add('show');
    try{const s=SETS[state.setIdx];setBest(s.key,'workbook',pct);
      addHistory({date:todayStr(),pages:s.pages,topic:s.topic,mode:'workbook',modeName:'구문·어법 워크북',score:correct,total,pct,retry:false});
      gam_record({kind:'workbook',setKey:s.key,pages:s.pages,topic:s.topic,results:[],score:correct,total});}catch(_){}
    box.scrollIntoView({behavior:'smooth',block:'center'});});
  const tog=root.querySelector('.wb-toggle');
  tog.addEventListener('click',()=>{const a=root.querySelector('#answerSheet');
    a.classList.toggle('hide');tog.textContent=a.classList.contains('hide')?'정답·해설 보기':'정답·해설 숨기기';
    if(!a.classList.contains('hide'))a.scrollIntoView({behavior:'smooth'});});
}


/* ===== 게임화 · SRS (통합) ===== */
const SRS_IV=[0,1,2,4,8,16,32];
function gToday(){const d=new Date();return d.getFullYear()+'-'+String(d.getMonth()+1).padStart(2,'0')+'-'+String(d.getDate()).padStart(2,'0');}
function gAddDays(n){const d=new Date();d.setDate(d.getDate()+n);return d.getFullYear()+'-'+String(d.getMonth()+1).padStart(2,'0')+'-'+String(d.getDate()).padStart(2,'0');}
function srsUpdate(setKey,word,ok){const key=setKey+'::'+word;let e=store.srs[key]||{box:0,correct:0,wrong:0,last:'',next:''};
  if(ok){e.correct++;e.box=Math.min(e.box+1,6);}else{e.wrong++;e.box=Math.max(e.box-1,0);}
  e.last=gToday();e.next=gAddDays(ok?SRS_IV[e.box]:0);store.srs[key]=e;return e;}
function dueWords(){const out=[];const t=gToday();SETS.forEach(s=>s.words.forEach(w=>{const e=store.srs[s.key+'::'+w.w];if(e&&e.next<=t&&!isInstruction(w))out.push({s,w,e});}));return out;}
function masteryPct(setKey){const s=SETS.find(x=>x.key===setKey);if(!s)return 0;let m=0;s.words.forEach(w=>{const e=store.srs[setKey+'::'+w.w];if(e&&e.box>=3)m++;});return Math.round(m/s.words.length*100);}
function masteredCount(){let c=0;for(const k in store.srs){if(store.srs[k].box>=3)c++;}return c;}
function levelFor(xp){return Math.floor(Math.sqrt((xp||0)/40))+1;}
function xpInLevel(xp){xp=xp||0;const l=levelFor(xp);const base=40*(l-1)*(l-1);const next=40*l*l;return {l,cur:xp-base,need:next-base};}
function addXP(n){store.xp=(store.xp||0)+n;}
function touchStreak(){const t=gToday(),y=gAddDays(-1);if(store.streak.last===t)return false;
  if(store.streak.last===y)store.streak.count++;else store.streak.count=1;store.streak.last=t;return true;}
function setsTried(){const s=new Set();for(const k in store.best){s.add(String(k).split("::")[0]);}return s.size;}

function cleanSense(m){

    .split(/\s*\d+\s*[.)]\s*|[,、;；\/]/).map(s=>s.replace(/\([^)]*\)/g,'').trim()).filter(Boolean);
  return parts[0]||(m||'').trim();
}

let voices=[];
let voicesReady=false;
function loadVoices(){
  if(!window.speechSynthesis) return;
  const v=speechSynthesis.getVoices();
  if(v && v.length){ voices=v; voicesReady=true; }
}
if(window.speechSynthesis){
  loadVoices();
  speechSynthesis.onvoiceschanged=loadVoices;
  // 일부 브라우저는 onvoiceschanged가 늦거나 안 오므로, 잠깐씩 재시도
  let tries=0;
  const iv=setInterval(()=>{ loadVoices(); if(voicesReady||++tries>20) clearInterval(iv); }, 250);
  // iOS 사파리 등: 첫 사용자 터치에 음성엔진을 한 번 깨워야 이후 발음이 안정적으로 나옴
  let ttsWarmed=false;
  function warmTTS(){
    if(ttsWarmed) return; ttsWarmed=true;
    try{
      loadVoices();
      const u=new SpeechSynthesisUtterance(" ");
      u.volume=0; // 무음으로 깨우기만
      speechSynthesis.speak(u);
    }catch(_){}
    document.removeEventListener("touchend", warmTTS);
    document.removeEventListener("click", warmTTS);
  }
  document.addEventListener("touchend", warmTTS, {once:false});
  document.addEventListener("click", warmTTS, {once:false});
}
function pickVoice(lang){
  if(lang==="ko") return voices.find(v=>/^ko/i.test(v.lang))||null;
  return voices.find(v=>/en[-_]US/i.test(v.lang))||voices.find(v=>/^en/i.test(v.lang))||null;
}
function doSpeak(text,btn,lang){
  const u=new SpeechSynthesisUtterance(text);
  const v=pickVoice(lang); if(v)u.voice=v;
  u.lang = v ? v.lang : (lang==="ko"?"ko-KR":"en-US");
  u.rate=0.9;
  if(btn){document.querySelectorAll(".playing").forEach(e=>e.classList.remove("playing"));
    btn.classList.add("playing"); u.onend=u.onerror=()=>btn.classList.remove("playing");}
  try{ speechSynthesis.speak(u); }catch(_){}
}
function speak(text,btn,lang){
  if(!window.speechSynthesis){ return; }
  lang=lang||"en";
  try{ speechSynthesis.cancel(); }catch(_){}
  // 음성 목록이 아직 로드 안 됐으면 한 번 더 불러오고, 그래도 없으면 잠깐 뒤 재생
  if(!voicesReady){
    loadVoices();
    if(!voicesReady){
      setTimeout(()=>doSpeak(text,btn,lang), 250);
      return;
    }
  }
  doSpeak(text,btn,lang);
}

function normEn(s){return (s||"").toLowerCase().replace(/[^a-z ]/g,"").trim();}
function lev(a,b){const m=a.length,n=b.length;if(!m)return n;if(!n)return m;
  const d=Array.from({length:m+1},(_,i)=>[i,...Array(n).fill(0)]);
  for(let j=1;j<=n;j++)d[0][j]=j;
  for(let i=1;i<=m;i++)for(let j=1;j<=n;j++)d[i][j]=Math.min(d[i-1][j]+1,d[i][j-1]+1,d[i-1][j-1]+(a[i-1]===b[j-1]?0:1));
  return d[m][n];}
// 영국식/미국식 철자 차이는 정답으로 인정 (예: recognise=recognize)
function ukUs(a,b){
  const f=(x)=>x.replace(/ise$/,"ize").replace(/isation$/,"ization")
    .replace(/our$/,"or").replace(/re$/,"er").replace(/ll/g,"l").replace(/ae|oe/g,"e");
  return f(a)===f(b);
}
// typed=true 이면 철자를 정확히 요구(오타 불인정), 음성이면 근접 발음 허용
function matchEn(target,heardList,typed){
  const tgt=normEn(target);
  for(const h of heardList){
    const hh=normEn(h); if(!hh) continue;
    if(hh===tgt) return {ok:true,heard:h};                 // 정확 일치
    if(ukUs(hh,tgt)) return {ok:true,heard:h};             // 영/미 철자 차이만 허용
    if(typed) continue;                                    // 타이핑은 여기까지(오타 불인정)
    // ↓ 음성 인식일 때만: 여러 단어로 들리거나 발음이 근접하면 허용
    if(hh.split(" ").includes(tgt)) return {ok:true,heard:h};
    const dist=lev(tgt,hh.replace(/ /g,""));
    const tol = tgt.length>=8 ? 1 : (tgt.length>=5 ? 1 : 0); // 훨씬 엄격하게
    if(tol>0 && dist<=tol) return {ok:true,heard:h};
  }
  return {ok:false,heard:heardList[0]||""};
}

/* 한글 채점 */
function normKo(s){return (s||"").replace(/\([^)]*\)/g,"").replace(/~/g,"").replace(/[.\/·]/g," ").replace(/\s+/g,"").trim();}

/* 한글 자모 분해 기반 근접 판정 (음성 오인식 흡수: 움직임↔움직이 등) */
function decomposeKo(s){
  const CHO=['ㄱ','ㄲ','ㄴ','ㄷ','ㄸ','ㄹ','ㅁ','ㅂ','ㅃ','ㅅ','ㅆ','ㅇ','ㅈ','ㅉ','ㅊ','ㅋ','ㅌ','ㅍ','ㅎ'];
  const JUNG=['ㅏ','ㅐ','ㅑ','ㅒ','ㅓ','ㅔ','ㅕ','ㅖ','ㅗ','ㅘ','ㅙ','ㅚ','ㅛ','ㅜ','ㅝ','ㅞ','ㅟ','ㅠ','ㅡ','ㅢ','ㅣ'];
  const JONG=['','ㄱ','ㄲ','ㄳ','ㄴ','ㄵ','ㄶ','ㄷ','ㄹ','ㄺ','ㄻ','ㄼ','ㄽ','ㄾ','ㄿ','ㅀ','ㅁ','ㅂ','ㅄ','ㅅ','ㅆ','ㅇ','ㅈ','ㅊ','ㅋ','ㅌ','ㅍ','ㅎ'];
  let out=[];
  for(const ch of s){
    const code=ch.charCodeAt(0)-0xAC00;
    if(code>=0 && code<11172){
      out.push(CHO[Math.floor(code/588)]);
      out.push(JUNG[Math.floor((code%588)/28)]);
      const j=code%28; if(j) out.push(JONG[j]);
    } else out.push(ch);
  }
  return out.join('');
}
function levStr(a,b){const m=a.length,n=b.length;if(!m)return n;if(!n)return m;
  const d=Array.from({length:m+1},(_,i)=>[i,...Array(n).fill(0)]);
  for(let j=1;j<=n;j++)d[0][j]=j;
  for(let i=1;i<=m;i++)for(let j=1;j<=n;j++)d[i][j]=Math.min(d[i-1][j]+1,d[i][j-1]+1,d[i-1][j-1]+(a[i-1]===b[j-1]?0:1));
  return d[m][n];}
// 두 한글 단어가 발음상 거의 같은지 (끝소리 오인식만 인정, 앞부분 차이는 거부)
function koClose(a,b){
  if(!a||!b) return false;
  if(a===b) return true;
  // 짧은 단어(2글자 이하)는 자모가 적어 오탐 위험 → 근접 판정 안 함 (바다↔배, 얼↔열 차단)
  if(a.length<=2 || b.length<=2) return false;
  const da=decomposeKo(a), db=decomposeKo(b);
  if(Math.abs(da.length-db.length)>1) return false; // 길이 차 크면 다른 말
  const dist=levStr(da,db);
  if(dist>1) return false;                            // 자모 2개 이상 차이는 다른 말
  // 자모 1개 차이여도, 그 차이가 '앞쪽'이면 다른 단어(과학↔화학, 향상↔항상) → 거부
  const keep=Math.floor(Math.min(da.length,db.length)*0.6);
  if(keep>=1 && da.slice(0,keep)!==db.slice(0,keep)) return false;
  return true;
}

// 형용사/동사 어간 추출 (거대한->거대, 줄이다->줄이, 영리한->영리)
function koStem(x){
  return x.replace(/(스러운|로운|러운|하는|되는|시키는|한|난|은|인|다|하다|되다|시키다|기)$/,"");

function synMatch(a,b){
  for(const g of SYN_GROUPS){ if(g.includes(a)&&g.includes(b)) return true; }
  // 어간 단위로도 그룹 대조 (활용형 흡수)
  const as=koStem(a), bs=koStem(b);
  if(as.length>=1 && bs.length>=1 && (as!==a || bs!==b)){
    for(const g of SYN_GROUPS){
      const stems=g.map(koStem);
      if(stems.includes(as)&&stems.includes(bs)) return true;
    }
  }
  return false;
}

// 괄호 부분은 '생략 가능'으로 보고, 빼고/넣고 두 형태 모두 정답 인정
// (턱)수염 → "수염" + "턱수염",  (신발의) 굽 → "굽" + "신발의굽"
function parenVariants(s){
  if(!/\(/.test(s)) return [s];
  const without=s.replace(/\([^)]*\)/g,'');   // 괄호와 그 안의 내용 제거
  const withIn =s.replace(/[()]/g,'');          // 괄호 기호만 제거, 내용은 유지
  return [without, withIn];
}

// "호기심이 많은" → "호기심 많은",  "물을 주다" → "물 주다"  (끝 조사·단독어는 유지)
function stripMedialParticles(s){
  return s.replace(/([가-힣])(이|가|을|를|은|는|에|의|도|만|와|과)(\s)/g,"$1$3");

// (은/는/이/가/의는 실제 단어 앞머리일 수 있어 제외 → "은퇴"의 '은' 오제거 방지)

    if(stem.length>=1)keys.add(stem);
    // 앞에 붙은 수식 부사(몹시/매우/특히/주로…)를 뗀 핵심 뜻도 인정: "몹시화가난"→"화가난"
    const core=p.replace(/^(톡톡|톡|콕콕|콕|쿡|살짝|살살|슬쩍|슬며시|가만히|지그시|몹시|매우|아주|너무|정말|참으로|굉장히|대단히|무척|꽤|상당히|다소|약간|조금|특히|특별히|주로|흔히|보통)/,"");
    if(core!==p && core.length>=1){
      keys.add(core);
      const cs=core.replace(/(하다|되다|시키다|하는|되는|한|된|히|이다|다)$/,"");
      if(cs.length>=1)keys.add(cs);
    }
  };
  // "1. …  2. …", "①…②…", "1) …" 등 번호 매김을 개별 뜻 경계(|)로 변환
  const s=(mean||"")
    .replace(/[①②③④⑤⑥⑦⑧⑨⑩]/g,"|")
    // [명]/[동] 같은 대괄호 품사표시도 뜻 경계로 (예: "[명] 좌석, 자리 [동] 앉히다")
    .replace(/\[\s*(명사|동사|형용사|부사|대명사|전치사|접속사|감탄사|조동사|명|동|형|부|대|전|접|감|조)\s*\]/g,"|")
    .replace(/(^|\s)\d+\s*[.)]/g,"|");
  // 쉼표·슬래시·세미콜론·번호경계로 각각의 뜻을 분리
  const parts=s.split(/[,、;；\/|]/).map(p=>p.trim()).filter(Boolean);
  parts.forEach(part0=>{
    // 뜻 안에 박힌 품사 라벨("명 마음", "동 가리키다")은 뜻이 아니므로 제거
    const part=part0.replace(/^\s*(명사|동사|형용사|부사|대명사|전치사|접속사|감탄사|조동사|명|동|형|부|대|전|접|감|조)\s+/,"");
    parenVariants(part).forEach(v=>{
      // 원형 + 중간조사 제거 + 앞 목적어표지 제거 + 둘 다 제거 → 모든 형태를 키에 추가
      const forms=new Set([v, stripMedialParticles(v), stripLeadingObject(v), stripLeadingObject(stripMedialParticles(v))]);
      forms.forEach(f=>add(normKo(f)));
    });
  });
  return [...keys];
}
const ACCEPT_EXTRA = {};
function matchKo(mean,heardList,word,spoken,pos){
  // 이 단어가 여러 세트에서 가진 모든 뜻을 정답 키로 통합 (movement=움직임/운동 모두 인정)
  let keys=answerKeys(mean);
  const extra=allMeansFor(word);
  const ax=(ACCEPT_EXTRA[(word||"").toLowerCase().trim()]||[]);
  if(extra.length || ax.length){
    const set=new Set(keys);
    extra.forEach(m=>answerKeys(m).forEach(k=>set.add(k)));
    ax.forEach(m=>answerKeys(m).forEach(k=>set.add(k)));
    keys=[...set];
  }
  // 종결 조사만 제거 (부사/형용사 파생 어미 '~하게/~적으로/~답게' 등은 남겨 품사 구분 유지)
  const stripJosa=(x)=>x.replace(/(습니다|ㅂ니다|입니다|이에요|예요|이요|이야|야|이다|요)$/,"");
  // 품사 엄격: 순수 동사(용언)면 학생 답도 동사형('다'로 끝남)이어야 인정 → 명사형(실패) 오답.
  const P=pos||"";
  const meanFirst=(mean||"").split(/\s*\d+\s*\.\s*|[,、;；\/]/)[0].replace(/^\s*(명|동|형|부)\s+/,"").replace(/\([^)]*\)/g,"").trim();
  // 순수 동사 = 품사에 명/형/부 없이 동만(또는 라벨없고 뜻이 다로 끝나는 동사구). 형·동/부·동 겸용은 형용사/부사 답도 인정.
  const verbLike=!/[명형부]/.test(P) && (/동/.test(P) || /다$/.test(meanFirst));
  for(const raw of heardList){
    let h0=normKo(raw); if(!h0) continue;
    if(verbLike && !/다$/.test(h0)) continue;   // 순수 동사인데 답이 동사형(다)이 아니면 불인정(조사 제거 전 판정)
    let h=stripJosa(h0);
    // 1) 정확 일치만 인정 (부분 포함 판정은 쓰지 않음 → 명사↔부사 오탐 차단)
    for(const k of keys){ if(h===k) return {ok:true,heard:raw}; }
    // 2) 등록된 유사어 그룹만 추가 인정 (활용형은 synMatch 내부 koStem이 흡수)
    for(const k of keys){ if(synMatch(h,k)) return {ok:true,heard:raw}; }
    // 2.6) 학생 답 맨 앞의 목적어 표지(를/을/에 …)도 떼고 비교: "를 버리다" ↔ "~을 버리다"
    const hObj=stripJosa(normKo(stripLeadingObject(raw)));
    if(hObj && hObj!==h){
      for(const k of keys){ if(hObj===k || synMatch(hObj,k)) return {ok:true,heard:raw}; }
    }
    // 2.5) 뉘앙스/부분 정답: 학생 답이 정답의 '앞부분(핵심 수식어)'과 일치하면 인정
    //      (엄지 ↔ 엄지손가락). 한 쪽이 다른 쪽의 접두일 때만 → 뒷부분(일반명사)·부사 오탐은 차단.
    for(const k of keys){
      if(h.length>=2 && k.length>=2 && (k.startsWith(h) || h.startsWith(k))) return {ok:true,heard:raw};
    }
    // 3) 음성 입력일 때만: 자모 1개 차이(끝소리 오인식 등)는 정답 인정 (움직임↔움직이)
    if(spoken){
      for(const k of keys){ if(koClose(h,k)) return {ok:true,heard:raw}; }
      // 뒤에 딴말이 붙은 경우: 앞부분이 정답과 근접하면 인정 (움직이는것→움직임)
      // 단, 파생 어미(~답게/~하게/~적으로 등)가 붙은 건 품사가 달라지므로 제외
      const hasDeriv=/(답게|스럽게|롭게|하게|있게|적으로|적인|스러운|로운)/.test(h);
      if(!hasDeriv){
        for(const k of keys){
          if(k.length>=2 && h.length>k.length){
            const head=h.slice(0,k.length);
            if(koClose(head,k)) return {ok:true,heard:raw};
          }
        }
      }
    }
  }
  return {ok:false,heard:heardList[0]||""};
}

let exquiz=null;
// 시험 지시문 성격의 문장(예문이 아님)은 제외
function isInstruction(w){
  const ko=w.exKo||"", en=w.ex||"";
  if(/고르시오|고르세요|물음에 답|알맞은 것을|가장 적절한 것을|밑줄 친|빈칸에 들어갈/.test(ko)) return true;
  if(/^Choose |^Read the|^What is the (best )?(title|main)|for the passage/i.test(en)) return true;
  return false;
}
function blankExample(word, ex){
  if(!ex) return null;
  const w=(word||"").trim();
  if(w.includes(" ")||w.includes("~")){
    const core=w.replace(/~/g,"").trim();
    const re=new RegExp(core.replace(/[.*+?^${}()|[\]\\]/g,"\\$&"),"i");
    if(re.test(ex)) return ex.replace(re,"______");
    return null;
  }
  let stem=w;
  if(/(e|y)$/.test(w)) stem=w.slice(0,-1);
  const re=new RegExp("\\b"+stem.replace(/[.*+?^${}()|[\]\\]/g,"\\$&")+"[a-z]{0,4}\\b","i");
  const m=ex.match(re);
  if(m) return ex.replace(m[0],"______");
  return null;
}
function startExQuiz(kind){
  const s=SETS[state.setIdx];
  // 지시문 성격 문장은 예문 시험에서 제외
  const valid=s.words.filter(w=>!isInstruction(w));
  let pool=valid.map(w=>({w, blank: blankExample(w.w, w.ex)}));
  if(kind==="exword") pool=pool.filter(x=>x.blank);
  else pool=pool.filter(x=>x.w.ex && x.w.exKo);
  pool=shuffle(pool);
  const qs=pool.map(x=>{
    let prompt, answer, options;
    if(kind==="exword"){
      prompt=x.blank; answer=x.w.w;
      const wrongs=shuffle(valid.filter(o=>o.w!==x.w.w)).slice(0,3).map(o=>o.w);
      options=shuffle([answer,...wrongs]);
    }else{
      prompt=x.w.ex; answer=x.w.exKo;
      // 오답 해석도 지시문이 아닌 실제 예문 해석에서만 뽑기 + 중복 방지
      const others=[...new Set(valid.filter(o=>o.exKo && o.exKo!==x.w.exKo).map(o=>o.exKo))];
      const wrongs=shuffle(others).slice(0,3);
      options=shuffle([answer,...wrongs]);
    }
    return {word:x.w, prompt, answer, options};
  });
  exquiz={kind, qs, i:0, picked:null, score:0, results:[], done:false, saved:false, showHint:false};
}

      addHistory({date:todayStr(),pages:s.pages,topic:s.topic,mode:kind,

    const rev=exquiz.results.map(r=>`

        <button class="rspk" data-speak="${esc(r.word.w)}" data-lang="en">${ICON_SPK_SM}</button></div>`).join("");
    return `
      <header><button class="backbtn" data-modes>‹ 뒤로</button><h1>${esc(s.pages)} 결과</h1>
        <div class="sub">${modeName} · 객관식</div></header>
      <div class="quiz"><div class="stresult">
        <div class="score">${score} / ${total}</div>
        <div class="lbl">${score===total?'완벽해요! 🎉':score>=total*0.7?'아주 잘했어요! 👏':'조금만 더 연습해봐요 💪'}</div>
        <button class="stbtn send" data-share style="margin-top:20px;width:100%;">📤 부모님께 결과 보내기</button>
        <button class="stbtn ghost" data-exretry style="margin-top:10px;width:100%;">다시 도전</button>
        <div class="review"><h4>단어별 결과</h4>${rev}</div>
      </div></div>`;
  }
  const q=exquiz.qs[exquiz.i];
  const pct=Math.round(exquiz.i/exquiz.qs.length*100);
  const opts=q.options.map(o=>{
    let cls="exopt";
    if(exquiz.picked!==null){
      if(o===q.answer) cls+=" correct";
      else if(o===exquiz.picked) cls+=" wrong";
    }
    return `<button class="${cls}" data-exopt="${esc(o)}" ${exquiz.picked!==null?'disabled':''}>${esc(o)}</button>`;
  }).join("");
  const hint = kind==="exword"
    ? (exquiz.showHint
        ? `<div class="exhint">뜻 힌트: <b>${esc(q.word.mean)}</b></div>`
        : `<button class="hintbtn" data-exhint>💡 힌트 보기</button>`)
    : "";
  return `
    <header><button class="backbtn" data-modes>‹ 뒤로</button>
      <h1>${esc(s.pages)} · ${modeName}</h1>
      <div class="sub">${kind==="exword"?"빈칸에 알맞은 단어를 고르세요":"알맞은 해석을 고르세요"}</div></header>
    <div class="quiz">
      <div class="qcard">
        <div class="qprog">${exquiz.i+1} / ${exquiz.qs.length}</div>
        <div class="qbar"><i style="width:${pct}%"></i></div>
        <div class="exprompt ${kind==="exword"?"":"small"}">${esc(q.prompt)}</div>
        ${hint}
        <div class="exopts">${opts}</div>
        <button class="qnext" data-exnext ${exquiz.picked===null?'disabled':''}>${exquiz.i+1===exquiz.qs.length?'결과 보기':'다음 →'}</button>
      </div>
    </div>`;
}

function buildShareText(){

  // 예문 퀴즈 결과
  if(state.view==="exquiz" && exquiz){

    const wrong=exquiz.results.filter(r=>r&&!r.ok).map(r=>r.word.w);
    let msg=`[영어 단어 시험 결과] ${emoji}\n${who}학생\n`;
    msg+=`· 범위: ${s.pages} ${s.topic}\n`;

    msg+=`· 점수: ${score} / ${total} (${pct}점)\n· 날짜: ${todayStr()}`;
    if(wrong.length) msg+=`\n· 틀린 단어: ${wrong.slice(0,10).join(", ")}${wrong.length>10?" 외":""}`;

  }
  if(!test) return "";
  const total=test.qs.length, score=test.results.filter(r=>r&&r.ok).length;
  const pct=Math.round(score/total*100);
  const emoji = pct===100?"🎉":pct>=70?"👏":"💪";
  const wrong=test.results.filter(r=>r&&!r.ok).map(r=>r.w.w);
  let msg=`[영어 단어 시험 결과] ${emoji}\n`;
  msg+=`${who}학생\n`;

async function shareResult(){
  const text=buildShareText();
  if(!text) return;
  // 1) 폰 기본 공유창 (카톡·문자 등 선택)
  if(navigator.share){
    try{ await navigator.share({title:"영어 단어 시험 결과", text}); return; }
    catch(e){ if(e && e.name==="AbortError") return; /* 사용자가 취소 */ }
  }
  // 2) 클립보드 복사 폴백
  try{
    await navigator.clipboard.writeText(text);
    showToast("결과가 복사됐어요! 카톡·문자에 붙여넣어 보내세요.");
    return;
  }catch(_){}
  // 3) 최후: 텍스트 보여주고 직접 복사
  showShareModal(text);
}
function showToast(msg){
  let t=document.getElementById("toast");
  if(!t){ t=document.createElement("div"); t.id="toast"; t.className="toast"; document.body.appendChild(t); }
  t.textContent=msg; t.classList.add("show");
  clearTimeout(t._h); t._h=setTimeout(()=>t.classList.remove("show"), 2600);
}
function showShareModal(text){
  let m=document.getElementById("sharemodal");
  if(m) m.remove();
  m=document.createElement("div"); m.id="sharemodal"; m.className="modal";
  m.innerHTML=`<div class="modalbox">

  const s=SETS[state.setIdx];
  const pool = (wordList && wordList.length) ? wordList : s.words;
  test={mode, qs:shuffle(pool), i:0, results:[], phase:"ready", heard:"", ok:null, retryWrong:!!wordList};
}

function micErrorMsg(err){
  switch(err){
    case "not-allowed":
    case "service-not-allowed":
      return "마이크 권한이 꺼져 있어요. 브라우저 주소창의 자물쇠(또는 ⋮ 메뉴)에서 마이크를 '허용'으로 바꿔 주세요.";
    case "no-speech":
      return "소리가 잘 안 들렸어요. 마이크 가까이에서 또박또박 말해 주세요.";
    case "audio-capture":
      return "마이크를 찾을 수 없어요. 다른 앱이 마이크를 쓰고 있지 않은지 확인해 주세요.";
    case "network":
      return "인터넷 연결을 확인해 주세요. (음성 인식은 인터넷이 필요해요.)";
    case "aborted":
      return "인식이 중단됐어요. 다시 눌러 주세요.";
    default:
      return "인식에 실패했어요. 다시 시도해 주세요.";
  }
}
function submitTyping(){
  const el=document.getElementById("typein");
  if(!el) return;
  const val=(el.value||"").trim();
  if(!val){ el.focus(); return; }
  const q=test.qs[test.i];
  const isKo=test.mode==="ko";
  const m = isKo ? matchKo(q.mean, [val], q.w, false, q.pos) : matchEn(q.w, [val], true);
  test.heard=val; test.ok=m.ok; test.phase="result";
  render();
  if(m.ok) speak(q.w, null, "en");
}
function recordOnce(){
  if(recording)return;
  // 안전장치: 로컬 파일(file://)에서는 크롬이 마이크를 막음
  if(location.protocol==="file:"){
    test.phase="error";
    test.errMsg="⚠️ 파일을 직접 열면 마이크가 막혀요.\n\n해결법: 이 파일을 구글 드라이브에 올려 열거나, 학교/집 PC에서 열 때는 크롬 대신 '엣지(Edge)' 브라우저로 열어 보세요. 아이폰은 사파리에서 대체로 동작합니다.";
    render(); return;
  }
  const q=test.qs[test.i];
  const isKo=test.mode==="ko";
  try{ recog=new SR(); }
  catch(e){ test.phase="error"; test.errMsg="이 브라우저에서 음성 인식을 시작할 수 없어요. 크롬(안드로이드·PC) 또는 사파리(아이폰)에서 열어 주세요."; render(); return; }
  recog.lang = isKo ? "ko-KR" : "en-US";
  recog.interimResults=false; recog.maxAlternatives=5;
  recording=true; test.phase="recording"; test.errMsg=""; render();
  let got=false;
  recog.onresult=(e)=>{
    got=true;
    const alts=[];
    for(let i=0;i<e.results[0].length;i++)alts.push(e.results[0][i].transcript);
    const m = isKo ? matchKo(q.mean, alts, q.w, true, q.pos) : matchEn(q.w, alts);
    test.heard=alts[0]; test.ok=m.ok; test.phase="result";
    recording=false; render();
    if(m.ok) speak(q.w, null, "en"); // 정답이면 영어 발음 들려주기
  };
  recog.onerror=(e)=>{
    recording=false;
    if(e.error==="no-speech"){
      // 말을 안 한 경우는 오답이 아니라 '다시 시도' 안내
      test.phase="error"; test.errMsg=micErrorMsg(e.error);
    } else {
      test.phase="error"; test.errMsg=micErrorMsg(e.error);
    }
    render();
  };
  recog.onend=()=>{ if(!got&&recording){recording=false; if(test.phase==="recording"){test.phase="error"; test.errMsg="소리가 인식되지 않았어요. 마이크를 누르고 다시 말해 주세요.";} render();} };
  try{recog.start();}
  catch(err){ recording=false; test.phase="error"; test.errMsg="마이크를 시작할 수 없어요. 잠시 후 다시 눌러 주세요."; render(); }
}

function bind(){
  const app=document.getElementById("app");
  app.onclick=(e)=>{
    const t=e.target.closest("[data-set],[data-home],[data-modes],[data-go],[data-test],[data-exquiz],[data-exopt],[data-exnext],[data-exretry],[data-exhint],[data-w],[data-speak],[data-mic],[data-submit],[data-next],[data-skip],[data-skip2],[data-retry],[data-retrywrong],[data-fav],[data-studyall],[data-studyfav],[data-share],[data-history],[data-setname],[data-workbook],[data-review],[data-challenge],[data-badges],[data-revshow],[data-revgrade],[data-chopt],[data-chnext],[data-mute],[data-timeattack],[data-taopt]");
    if(!t)return;
    if(t.hasAttribute("data-speak")){ e.stopPropagation(); speak(t.getAttribute("data-speak"), t, t.getAttribute("data-lang")||"en"); return; }
    if(t.hasAttribute("data-exquiz")){ startExQuiz(t.getAttribute("data-exquiz")); state.view="exquiz"; scrollTo(0,0); render(); return; }
    if(t.hasAttribute("data-exopt")){
      if(exquiz.picked!==null) return;
      const pick=t.getAttribute("data-exopt"); const q=exquiz.qs[exquiz.i];
      exquiz.picked=pick; const ok=(pick===q.answer); if(ok)exquiz.score++;
      exquiz.results[exquiz.i]={word:q.word, ok};
      render();
      // 정답 여부와 상관없이 예문 전체를 읽어줌 (학습 강화)
      speak(q.word.ex, null, "en"); return;
    }
    if(t.hasAttribute("data-exhint")){ exquiz.showHint=true; render(); return; }
    if(t.hasAttribute("data-exnext")){
      if(exquiz.i+1>=exquiz.qs.length){ exquiz.done=true; }
      else { exquiz.i++; exquiz.picked=null; exquiz.showHint=false; }
      scrollTo(0,0); render(); return;
    }
    if(t.hasAttribute("data-exretry")){ startExQuiz(exquiz.kind); scrollTo(0,0); render(); return; }
    if(t.hasAttribute("data-fav")){ e.stopPropagation(); toggleFav(SETS[state.setIdx].key, t.getAttribute("data-fav")); render(); return; }
    if(t.hasAttribute("data-studyall")){ state.studyFav=false; render(); return; }
    if(t.hasAttribute("data-studyfav")){ state.studyFav=true; render(); return; }
    if(t.hasAttribute("data-submit")){ submitTyping(); return; }
    if(t.hasAttribute("data-set")){ state.setIdx=+t.getAttribute("data-set"); state.view="modes"; state.studyFav=false; test=null; scrollTo(0,0); render(); return; }
    if(t.hasAttribute("data-home")){ state.view="home"; test=null; abortRec(); scrollTo(0,0); render(); return; }
    if(t.hasAttribute("data-modes")){ state.view="modes"; test=null; abortRec(); scrollTo(0,0); render(); return; }
    if(t.hasAttribute("data-go")){ state.view=t.getAttribute("data-go"); scrollTo(0,0); render(); return; }
    if(t.hasAttribute("data-test")){ startTest(t.getAttribute("data-test")); state.view="test"; scrollTo(0,0); render(); return; }
    if(t.hasAttribute("data-w")){ t.classList.toggle("open"); return; }
    if(t.hasAttribute("data-mic")){ recordOnce(); return; }
    if(t.hasAttribute("data-skip")){ test.results[test.i]={w:test.qs[test.i],ok:false,heard:"(넘김)"}; advance(); return; }
    if(t.hasAttribute("data-skip2")){ test.results[test.i]={w:test.qs[test.i],ok:false,heard:"(넘김)"}; advance(); return; }
    if(t.hasAttribute("data-next")){ test.results[test.i]={w:test.qs[test.i],ok:!!test.ok,heard:test.heard||""}; advance(); return; }
    if(t.hasAttribute("data-retry")){ startTest(test.mode); scrollTo(0,0); render(); return; }
    if(t.hasAttribute("data-retrywrong")){ const wrong=test.results.filter(r=>r&&!r.ok).map(r=>r.w); startTest(test.mode, wrong); scrollTo(0,0); render(); return; }
    if(t.hasAttribute("data-share")){ shareResult(); return; }
    if(t.hasAttribute("data-history")){ state.view="history"; scrollTo(0,0); render(); return; }
    if(t.hasAttribute("data-workbook")){ state.view="workbook"; scrollTo(0,0); render(); return; }
    if(t.hasAttribute("data-review")){ startReview(); state.view="review"; scrollTo(0,0); render(); return; }
    if(t.hasAttribute("data-challenge")){ startChallenge(); state.view="challenge"; scrollTo(0,0); render(); return; }
    if(t.hasAttribute("data-timeattack")){ startTimeAttack(); state.view="timeattack"; scrollTo(0,0); render(); return; }
    if(t.hasAttribute("data-taopt")){ taPick(t.getAttribute("data-taopt")); return; }
    if(t.hasAttribute("data-badges")){ state.view="badges"; scrollTo(0,0); render(); return; }
    if(t.hasAttribute("data-revshow")){ review.show=true; render(); return; }
    if(t.hasAttribute("data-revgrade")){ reviewGrade(t.getAttribute("data-revgrade")==="1"); return; }
    if(t.hasAttribute("data-chopt")){ challengePick(t.getAttribute("data-chopt")); return; }
    if(t.hasAttribute("data-chnext")){ challengeNext(); return; }
    if(t.hasAttribute("data-mute")){ store.mute=!store.mute; saveStore(); render(); return; }
    if(t.hasAttribute("data-setname")){ askName(); return; }
  };
  // (PC) 시험 입력창 자동 포커스 → 마우스 없이 키보드만으로 진행
  const typein=document.getElementById("typein");
  const _isTouch = window.matchMedia && window.matchMedia("(hover: none)").matches;
  if(typein){
    if(!_isTouch){ try{ typein.focus(); typein.select&&typein.select(); }catch(_){} }
  } else if(!_isTouch){
    // 결과/문제 화면: '다음' 버튼에 포커스 → 엔터를 누르면 브라우저가 그 버튼을 눌러줌(네이티브)
    const _nb=document.querySelector('[data-next]:not([disabled]),[data-exnext]:not([disabled]),[data-chnext]:not([disabled])');
    if(_nb){ try{ _nb.focus(); }catch(_){} }
  }
  // 엔터 처리: window 전역 캡처 리스너 1개로 통일(어떤 브라우저/포커스에서도 확실히 동작)
  //  · 시험 입력창(#typein)에 포커스: 엔터=제출  · 그 외 입력창: 각자 처리  · 나머지: '다음' 버튼 클릭
  if(!window._enterNav){
    window._enterNav=true;
    window.addEventListener("keydown",function(e){
      if((e.key!=="Enter" && e.keyCode!==13 && e.which!==13) || e.isComposing) return;
      const ae=document.activeElement;
      if(ae && ae.id==="typein"){ e.preventDefault(); if(typeof submitTyping==="function") submitTyping(); return; }
      if(ae && (ae.tagName==="INPUT" || ae.tagName==="TEXTAREA" || ae.tagName==="BUTTON")) return;
      const nx=document.querySelector('[data-next]:not([disabled]),[data-exnext]:not([disabled]),[data-chnext]:not([disabled])');
      if(nx){ e.preventDefault(); e.stopPropagation(); nx.click(); }
    }, true);
  }
}
function abortRec(){ if(recog){try{recog.abort()}catch(_){}} recording=false; }
function advance(){
  if(test.i+1>=test.qs.length){ test.phase="done"; }
  else{ test.i++; test.phase="ready"; test.heard=""; test.ok=null; }
  scrollTo(0,0); render();
}
render();
</script>
</body>
</html>
